<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom · PCOS Wellness App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0b14;
      background-image:
        radial-gradient(ellipse at 15% 50%, #2a1845 0%, transparent 55%),
        radial-gradient(ellipse at 85% 50%, #0f2b1f 0%, transparent 55%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #f0eaf7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }

    .page {
      display: flex;
      align-items: center;
      gap: 72px;
      max-width: 1020px;
      width: 100%;
    }

    /* ── Left panel ── */
    .info { flex: 1; min-width: 0; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px;
      color: #b8a8cc;
      letter-spacing: 0.04em;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 60px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
      background: linear-gradient(140deg, #f5e0ff 0%, #c8a8e8 45%, #9fd4c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: 17px;
      color: #8a7aa0;
      line-height: 1.65;
      margin-bottom: 32px;
      max-width: 400px;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11.5px;
      color: #9a88b4;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    .actions { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }

    .btn-gh {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      color: #e8ddf5;
      font-weight: 600;
      font-size: 14px;
      padding: 11px 20px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-gh:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.22); }

    .btn-full {
      color: #7a6a90;
      font-size: 13px;
      text-decoration: none;
      padding: 11px 0;
      transition: color 0.15s;
    }
    .btn-full:hover { color: #b8a8cc; }

    /* ── Phone mockup ── */
    /* Render at real iPhone 14 Pro dimensions, then scale down visually */
    .phone-wrap {
      flex-shrink: 0;
      /* After scale(0.60): visual size ≈ 258×558px */
      width: 258px;
      height: 558px;
    }

    .phone-scale {
      width: 430px;
      height: 930px;
      transform: scale(0.60);
      transform-origin: top left;
    }

    .phone {
      width: 430px;
      height: 930px;
      border-radius: 56px;
      border: 11px solid #3a3a3c;
      background: #000;
      position: relative;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 50px 140px rgba(0,0,0,0.85),
        0 0 80px rgba(160,80,220,0.12),
        0 0 0 1px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Volume buttons (left side) */
    .phone::before {
      content: '';
      position: absolute;
      left: -15px;
      top: 148px;
      width: 4px;
      height: 34px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #3a3a3c;
    }

    /* Power button (right side) */
    .phone::after {
      content: '';
      position: absolute;
      right: -15px;
      top: 192px;
      width: 4px;
      height: 72px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
    }

    /* Dynamic island */
    .island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* Screen */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 46px;
      overflow: hidden;
      background: #fff;
      display: flex;
      justify-content: center;
    }

    iframe {
      width: 390px;
      height: 930px;
      border: none;
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      .page {
        flex-direction: column;
        align-items: center;
        gap: 48px;
      }
      .info { text-align: center; }
      .subtitle, .stack, .actions { margin-left: auto; margin-right: auto; }
      .stack { justify-content: center; }
      .actions { justify-content: center; }
      h1 { font-size: 44px; }
      .phone-wrap {
        width: 216px;
        height: 468px;
      }
      .phone-scale {
        transform: scale(0.50);
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="info">
      <div class="tag">🌸 Personal project · iOS app</div>
      <h1>Bloom</h1>
      <p class="subtitle">
        AI-powered wellness companion for PCOS — cycle tracking, phase-aware meal &amp; workout plans, daily Gemini insights, and symptom logging.
      </p>
      <div class="stack">
        <span class="pill">React Native</span>
        <span class="pill">Expo SDK 54</span>
        <span class="pill">Expo Router</span>
        <span class="pill">TypeScript</span>
        <span class="pill">Gemini 2.5 Flash</span>
        <span class="pill">AsyncStorage</span>
      </div>
      <div class="actions">
        <a href="https://github.com/Diyasingh03/sync" class="btn-gh" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          View source
        </a>
        <a href="/" class="btn-full" target="_blank" rel="noopener">Open full screen ↗</a>
      </div>
    </div>

    <div class="phone-wrap">
      <div class="phone-scale">
        <div class="phone">
          <div class="island"></div>
          <div class="screen">
            <iframe
              src="/"
              title="Bloom app — interactive demo"
              loading="lazy"
              allow="storage-access"
            ></iframe>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
